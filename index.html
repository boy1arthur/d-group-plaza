        function extractChosung(str) {
            const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            let result = "";
            for (let i = 0; i < str.length; i++) {
                let code = str.charCodeAt(i) - 44032;
                if (code >= 0 && code <= 11172) { result += cho[Math.floor(code / 588)]; } else { result += str.charAt(i); }
            }
            return result;
        }

        window.onload = function() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) { verses = JSON.parse(saved); render(); }
            
            const today = new Date();
            document.getElementById('meetingDate').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            
            if(localStorage.getItem("square_author")) document.getElementById('squareAuthor').value = localStorage.getItem("square_author");

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('admin') === "7777") { // 비밀번호 검증 필터 고정
                localStorage.setItem("is_admin_user", "YES");
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            if (localStorage.getItem("is_admin_user") !== "YES") document.getElementById('tabAdmin').style.display = 'none';
            
            syncCloud();
        };

        function switchTab(mode) {
            if (mode === 'admin' && localStorage.getItem("is_admin_user") !== "YES") { alert("🔒 관리자 권한이 없습니다."); return; }
            document.getElementById('tabMember').className = "flex-1 py-4 text-center font-bold flex items-center justify-center gap-0.5 cursor-pointer " + (mode === 'member' ? "text-emerald-700 border-b-2 border-emerald-600" : "text-gray-400");
            document.getElementById('tabSquare').className = "flex-1 py-4 text-center font-bold flex items-center justify-center gap-0.5 cursor-pointer " + (mode === 'square' ? "text-emerald-700 border-b-2 border-emerald-600" : "text-gray-400");
            document.getElementById('tabAdmin').className = "flex-1 py-4 text-center font-bold flex items-center justify-center gap-0.5 cursor-pointer " + (mode === 'admin' ? "text-emerald-700 border-b-2 border-emerald-600" : "text-gray-400");
            
            document.getElementById('viewMember').classList.toggle('hidden', mode !== 'member');
            document.getElementById('viewSquare').classList.toggle('hidden', mode !== 'square');
            document.getElementById('viewAdmin').classList.toggle('hidden', mode !== 'admin');
            document.getElementById('adminFooter').classList.toggle('hidden', mode !== 'admin');

            if(mode === 'member' || mode === 'square') syncCloud();
        }

        function getFormattedDateString(customDateVal) {
            const rawVal = customDateVal || document.getElementById('meetingDate').value;
            if(!rawVal) return "날짜 미기입";
            try {
                if (rawVal.includes("년") && rawVal.includes("월")) return rawVal;
                const dateObj = new Date(rawVal);
                if (isNaN(dateObj.getTime())) return rawVal;
                const days = ['일', '월', '화', '수', '목', '금', '토'];
                return `${dateObj.getFullYear()}년 ${dateObj.getMonth() + 1}월 ${dateObj.getDate()}일 (${days[dateObj.getDay()]})`;
            } catch(e) { return rawVal; }
        }

                    wordContainer.appendChild(card);

                            <div class="flex items-center gap-1.5">
                                <span class="font-bold text-emerald-800 bg-emerald-50 px-2 py-0.5 rounded-sm">${item.author}</span>
                                <span class="text-gray-400">${item.time}</span>
                            </div>
                            ${editButtonHtml}
                        </div>
                        <p class="text-sm text-gray-700 leading-relaxed mt-1 select-text">${item.message}</p>
                    `;
                    squareContainer.appendChild(post);
                });
            } catch(e) { console.error(e); }
        }

        // 🌐 자유 광장 신규 등록 및 수정 동시 처리 모듈
        async function sendToSquare() {
            const author = document.getElementById('squareAuthor').value.trim();
            const message = document.getElementById('squareMessage').value.trim();
            if(!author || !message) { alert("닉네임과 내용을 입력해 주세요."); return; }
            
            localStorage.setItem("square_author", author);
            
            // 수정 모드 상태인지 신규 등록 상태인지 판별
            let msgId = currentEditMsgId;
            let isNew = false;
            
            if (!msgId) {
                // 신규 등록 시 고유 ID 강제 발급 생성 (시간값 기반)
                msgId = "msg_" + new Date().getTime();
                isNew = true;
            }

            // 인풋 박스 초기화 및 UI 복구
            document.getElementById('squareMessage').value = "";
            cancelSquareEdit();

            try {
                await fetch(GOOGLE_API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ type: "SQUARE", author: author, message: message, msgId: msgId })
                });

                if (isNew) {
                    // 신규 글 등록에 성공했을 때만 내 로컬 저장소에 ID 각인 등록
                    const myPostIds = JSON.parse(localStorage.getItem(MY_POSTS_KEY) || "[]");
                    myPostIds.push(msgId);
                    localStorage.setItem(MY_POSTS_KEY, JSON.stringify(myPostIds));
                }

                setTimeout(() => { syncCloud(); }, 500);
            } catch(e) { alert("광장 통신 중 지연 에러가 발생했습니다."); }
        }

        // ✏️ 연필 버튼 터치 시 인풋 폼으로 내용 소환 바인딩
        function initiateEditSquare(msgId, author, message) {
            currentEditMsgId = msgId;
            document.getElementById('squareAuthor').value = author;
            document.getElementById('squareMessage').value = message;
            document.getElementById('squareSubmitBtn').innerText = "변경";
            document.getElementById('squareSubmitBtn').className = "bg-amber-600 hover:bg-amber-700 text-white font-bold px-4 rounded-xl text-sm active:scale-95 cursor-pointer";
            document.getElementById('editModeIndicator').classList.remove('hidden');
            document.getElementById('squareMessage').focus();
        }

        // 수정 모드 종료 및 초기화
        function cancelSquareEdit() {
            currentEditMsgId = null;
            document.getElementById('squareSubmitBtn').innerText = "등록";
            document.getElementById('squareSubmitBtn').className = "bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 rounded-xl text-sm active:scale-95 cursor-pointer";
            document.getElementById('editModeIndicator').classList.add('hidden');
        }

        function openDetail(item) {
            document.getElementById('detailDate').innerText = `${item.date} (${item.group})`;
            document.getElementById('detailTopic').innerText = "⛪ 주간 조모임 정리 피드";
            document.getElementById('detailContent').innerText = item.content;
            document.getElementById('detailModal').classList.remove('hidden');
        }
        function closeDetail() { document.getElementById('detailModal').classList.add('hidden'); }
        async function copyDetailContent() {
            await navigator.clipboard.writeText(document.getElementById('detailContent').innerText);
            alert("말씀록이 복사되었습니다! ✨");
        }

        async function sendToCloud() {
            const dateVal = getFormattedDateString();
            const groupVal = document.getElementById('groupName').value || "대면D조";
            const topicNote = document.getElementById('meetingTopic').value.trim() || "주제 미기입";
            if (verses.length === 0) { alert("📚 초성 검색창을 이용해 성경 구절을 추가해 주세요!"); return; }
            const versesCombinedText = verses.join("\n");
            try {
                const res = await fetch(GOOGLE_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ type: "WORD", date: dateVal, group: groupVal, topic: versesCombinedText, content: topicNote })
                });
                const resData = await res.json();
                if(resData.status === "SUCCESS" && resData.compiledText) await navigator.clipboard.writeText(resData.compiledText);
                alert("🎯 카톡 양식 복사 및 클라우드 동기화 성공!");
                document.getElementById('meetingTopic').value = ""; verses = []; localStorage.removeItem(STORAGE_KEY); render(); switchTab('member');
            } catch (err) { 
                alert("🎯 클라우드 연동 완료!"); verses = []; localStorage.removeItem(STORAGE_KEY); render(); switchTab('member');
            }
        }

        function handleInput(value) {
            const sugList = document.getElementById('suggestionList');
            const trimmedValue = value.trim();
            if (!trimmedValue || /[0-9]/.test(trimmedValue)) { sugList.classList.add('hidden'); return; }
            const inputCho = extractChosung(trimmedValue);
            const filtered = bibleBooks.filter(book => {
                if (book.abbrev.startsWith(trimmedValue) || book.name.startsWith(trimmedValue) || book.cho.startsWith(inputCho)) return true;
                return false;
            });
            if (filtered.length > 0) {
                sugList.innerHTML = "";
                filtered.forEach(book => {
                    const li = document.createElement('li');
                    li.className = "px-4 py-3 hover:bg-emerald-50 text-base font-medium border-b border-gray-100 cursor-pointer flex justify-between";
                    li.innerHTML = `<span>${book.name}</span> <span class="text-emerald-600 font-bold">${book.abbrev}</span>`;
                    li.onclick = function() { startPickerFlow(book); }; sugList.appendChild(li);
                });
                sugList.classList.remove('hidden');
            } else { sugList.classList.add('hidden'); }
        }
        function startPickerFlow(bookObj) { selectedBookObj = bookObj; startVerse = null; document.getElementById('suggestionList').classList.add('hidden'); openChapterPicker(); }
        function openChapterPicker() {
            document.getElementById('nextFlowBtn').classList.add('hidden');
            document.getElementById('modalTitle').innerText = `${selectedBookObj.name} - 몇 장인가요?`;
            const grid = document.getElementById('numberGrid'); grid.innerHTML = "";
            for (let i = 1; i <= selectedBookObj.maxCh; i++) {
                const btn = document.createElement('button'); btn.className = "bg-gray-50 border border-gray-200 text-gray-800 font-semibold py-3 rounded-xl text-base";
                btn.innerText = i; btn.onclick = function() { selectedChapter = i; openVersePicker(); }; grid.appendChild(btn);
            }
            document.getElementById('pickerModal').classList.remove('hidden');
        }
        function openVersePicker() {
            document.getElementById('modalTitle').innerText = startVerse ? `${selectedBookObj.name} ${selectedChapter}장 ${startVerse}절부터 ~ 몇 절까지?` : `${selectedBookObj.name} ${selectedChapter}장 - 시작 절 선택`;
            if(!startVerse) { document.getElementById('nextFlowBtn').classList.add('hidden'); } else { document.getElementById('nextFlowBtn').classList.remove('hidden'); }
            const grid = document.getElementById('numberGrid'); grid.innerHTML = "";
            for (let i = 1; i <= 100; i++) {
                const btn = document.createElement('button');
                if(startVerse && i === startVerse) { btn.className = "bg-emerald-600 text-white font-bold py-3 rounded-xl text-base"; } 
                else { btn.className = "bg-gray-50 border border-gray-200 text-gray-800 font-semibold py-3 rounded-xl text-base"; }
                btn.innerText = i; btn.onclick = function() { handleVerseSelection(i); }; grid.appendChild(btn);
            }
        }
        function handleVerseSelection(verseNum) { if (!startVerse) { startVerse = verseNum; openVersePicker(); } else { if(verseNum < startVerse) return; finalizePickerVerse(`${startVerse}-${verseNum}`); } }
        function finishWithOnlyStartVerse() { if(startVerse) { finalizePickerVerse(startVerse); } }
        function finalizePickerVerse(verseRange) {
            const combinedString = `${selectedBookObj.name} ${selectedChapter}:${verseRange}`;
            verses.push(combinedString); localStorage.setItem(STORAGE_KEY, JSON.stringify(verses)); render(); closePicker();
            document.getElementById('verseInput').value = "";
        }
        function closePicker() { document.getElementById('pickerModal').classList.add('hidden'); }
        function skipToManual() { document.getElementById('verseInput').value = selectedBookObj.name + " "; closePicker(); }
        function deleteVerse(index) { verses.splice(index, 1); localStorage.setItem(STORAGE_KEY, JSON.stringify(verses)); render(); }
        function clearAll() { if (confirm("기록을 삭제할까요?")) { verses = []; localStorage.setItem(STORAGE_KEY, JSON.stringify(verses)); document.getElementById('meetingTopic').value = ""; render(); } }
        
        function render() {
            const listEl = document.getElementById('verseList');
            const contentSection = document.getElementById('contentSection');
            const hiddenArea = document.getElementById('hiddenTopicList');
            listEl.innerHTML = "";
            if (verses.length > 0) {
                contentSection.classList.remove('hidden');
                hiddenArea.value = verses.join("\n");
                verses.forEach((verse, index) => {
                    const li = document.createElement('li');
                    li.className = "flex items-center justify-between bg-gray-50 border border-gray-200 rounded-xl p-3 shadow-xs";
                    li.innerHTML = `<span class="text-sm font-semibold text-gray-800">${verse}</span><button onclick="deleteVerse(${index})" class="text-red-500 p-1"><span class="material-icons text-sm">delete</span></button>`;
                    listEl.appendChild(li);
                });
            } else { contentSection.classList.add('hidden'); }
        }
    </script>
</body>
</html>
